name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: urlshort
          POSTGRES_PASSWORD: urlshort
          POSTGRES_DB: urlshortener
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U urlshort"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

      - name: Run tests
        run: go test -race -cover ./internal/... ./pkg/...
        env:
          DATABASE_URL: "host=localhost user=urlshort password=urlshort dbname=urlshortener port=5432 sslmode=disable"
          REDIS_ADDR: "localhost:6379"

      - name: Build Docker image
        run: docker build -t urlshortener:ci .
